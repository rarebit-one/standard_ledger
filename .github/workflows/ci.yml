name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    uses: rarebit-one/.github/.github/workflows/reusable-gem-ci.yml@v1
    with:
      ruby-versions: '["4.0.0","4.0.1","4.0.2","4.0.3"]'
      extra-lint-commands: |
        bundle exec brakeman --no-pager --force
        bundle exec bundler-audit --update
