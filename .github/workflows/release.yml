name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    uses: rarebit-one/.github/.github/workflows/reusable-gem-release.yml@v2
    with:
      gem-name: standard_ledger
      ruby-version: "4.0.1"
    secrets:
      slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
    permissions:
      contents: write
      id-token: write
