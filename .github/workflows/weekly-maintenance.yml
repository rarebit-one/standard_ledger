name: Weekly Maintenance

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: weekly-maintenance-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write
  security-events: read

jobs:
  maintenance:
    uses: rarebit-one/.github/.github/workflows/reusable-weekly-maintenance.yml@v2
    with:
      stack: ruby-gem
      lint-commands: |
        bundle exec rubocop
      test-commands: |
        bundle exec rspec
    secrets:
      claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
